syntax = "proto3";

package mycel;

option go_package = "github.com/mycel/mesh/api/pb";

// NodeService provides node registration and discovery.
service NodeService {
  // Register a new node in the network.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Send heartbeat to keep node alive and update NAT info.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // List all nodes in the network.
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);

  // Unregister a node from the network.
  rpc Unregister(UnregisterRequest) returns (UnregisterResponse);
}

// NATInfo contains NAT detection results.
message NATInfo {
  // NAT type: "none", "full_cone", "restricted", "port_restricted", "symmetric"
  string nat_type = 1;
  // Public IP address
  string public_ip = 2;
  // Public port
  int32 public_port = 3;
  // Whether this node can participate in direct P2P
  bool can_punch = 4;
  // Local IP addresses
  repeated string local_ips = 5;
}

// RegisterRequest is sent by a node to join the network.
message RegisterRequest {
  // Unique identifier for the node (generated by client)
  string node_id = 1;
  // Human-readable name for the node
  string name = 2;
  // WireGuard public key (base64 encoded)
  string public_key = 3;
  // Join token for authentication
  string token = 4;
  // NAT detection results
  NATInfo nat_info = 5;
}

// PeerInfo contains information about a peer node.
message PeerInfo {
  // Node ID
  string node_id = 1;
  // Node name
  string name = 2;
  // Assigned virtual IP
  string ip = 3;
  // WireGuard public key
  string public_key = 4;
  // NAT info for hole punching
  NATInfo nat_info = 5;
  // Node status: "online", "offline"
  string status = 6;
}

// RegisterResponse is returned after successful registration.
message RegisterResponse {
  // Assigned virtual IP address (e.g., "10.0.0.2")
  string assigned_ip = 1;
  // Subnet CIDR (e.g., "10.0.0.0/16")
  string subnet_cidr = 2;
  // List of existing peers in the network
  repeated PeerInfo peers = 3;
  // Error message if registration failed
  string error = 4;
}

// HeartbeatRequest is sent periodically to maintain node status.
message HeartbeatRequest {
  // Node ID
  string node_id = 1;
  // Updated NAT info (may change)
  NATInfo nat_info = 2;
}

// HeartbeatResponse confirms heartbeat received.
message HeartbeatResponse {
  // List of new/updated peers since last heartbeat
  repeated PeerInfo peer_updates = 1;
  // List of node IDs that went offline
  repeated string offline_nodes = 2;
  // Server timestamp
  int64 timestamp = 3;
  // Error message if heartbeat failed
  string error = 4;
}

// ListNodesRequest requests all nodes in the network.
message ListNodesRequest {
  // Authentication token
  string token = 1;
}

// ListNodesResponse contains all nodes.
message ListNodesResponse {
  // List of all nodes
  repeated PeerInfo nodes = 1;
  // Error message if request failed
  string error = 2;
}

// UnregisterRequest removes a node from the network.
message UnregisterRequest {
  // Node ID to unregister
  string node_id = 1;
  // Authentication token
  string token = 2;
}

// UnregisterResponse confirms unregistration.
message UnregisterResponse {
  // Success indicator
  bool success = 1;
  // Error message if unregistration failed
  string error = 2;
}